# Example 03 — Load geometry from an existing file (any ASE-readable format)
#
# Run from the repo root:
#   pixi run example-03
# Or from any directory:
#   traincraft run examples/03_molecule_from_file.toml
#
# What it does:
#   1. Reads a geometry from a local .xyz / .extxyz / .cif / .pdb / ... file.
#      Paths are resolved relative to this config file's location, so you can
#      run from anywhere and they still work.
#   2. Applies a vacuum transform (useful if the file has no cell).
#   3. Runs a short MD and filters the results.
#
# To use your own structure, change 'path' to any ASE-readable file.
# Relative paths are relative to THIS config file's directory.

[run]
name   = "03_from_file"
outdir = "runs"
seed   = 0

[geometry.source]
type = "file"
path = "assets/h2o.xyz"   # relative to this config file; replace with your own

[[geometry.transforms]]
type   = "vacuum"
amount = 10.0      # Å

[calculator]
type = "emt"

[sampling]
type        = "md"
temperature = 200.0
steps       = 30
interval    = 10

[selection]
steps  = ["physicality", "dedup"]
budget = 3

[dataset]
path = "dataset"
