[run]
name = "filled_nanotube"
seed = 7
outdir = "runs"
# The original "fillMyTubes" use case: a carbon nanotube randomly filled with
# small molecules (here water), then sampled with MD. Packmol packs the guests
# inside the tube; the tube is tagged framework and each molecule is its own
# fragment. Needs the science env (Packmol + tblite/GFN2 for C/H/O).
# Run with:  pixi run -e science traincraft run examples/22_filled_nanotube.toml

[geometry.builder]
type          = "filled_nanotube"
n             = 10          # (10,10) armchair ≈ 13.6 Å diameter — roomy enough for water
m             = 10
length        = 6           # unit cells along the tube axis
molecule_name = "H2O"
n_molecules   = 6
# wall clearance is sized automatically from van der Waals radii; radial_margin
# is *extra* gap beyond that (0.0 = vdW contact). Tube carbons are also fed to
# Packmol as a fixed obstacle, so guests can never overlap the wall.
radial_margin = 0.5
pbc           = true        # periodic along the tube axis

[calculator]
type   = "tblite"           # GFN2-xTB: handles C/H/O (EMT does not)
method = "GFN2-xTB"

[sampling]
type        = "md"
temperature = 350.0
steps       = 200
interval    = 20
timestep    = 0.5

[selection]
steps  = ["physicality", "dedup", "diversity"]
budget = 10

[dataset]
path = "dataset"
